name: AURA-Health-Ambient CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment (3.10)
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-glx libglib2.0-0

    - name: Install Application Libraries
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Ensure testing packages are available for the verification pass
        pip install pandas matplotlib

    - name: Run Automated Static Pipeline Verification Tests
      run: |
        # Executes your validated mock simulator to test fallback states and kinetics math
        python tests/mock_simulator.py
